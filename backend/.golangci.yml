version: "2"

linters:
  enable:
    - errcheck        # catches silently discarded errors (io.ReadAll, etc.)
    - staticcheck     # broad correctness checks, replaces megacheck
    - unused          # dead code
    - govet           # same as go vet
    - ineffassign     # assignments whose value is never used
    - bodyclose       # http response body not closed
    - noctx           # http requests without context
    - exhaustive      # missing cases in switch on enum-like types
    - misspell        # common English spelling mistakes in comments/strings
    - godot           # checks that comments end with a period

linters-settings:
  errcheck:
    # Ignore intentional discards: tx.Rollback in defer (no-op after commit),
    # json encoder writes to http.ResponseWriter (already committed status).
    exclude-functions:
      - (*github.com/jackc/pgx/v5.Tx).Rollback
      - (*encoding/json.Encoder).Encode

  exhaustive:
    # Only enforce exhaustiveness on switches that have a default case already —
    # avoids false positives on open-ended string switches.
    default-signifies-exhaustive: true

  godot:
    # Only check exported (doc) comments, not inline comments.
    scope: declarations

issues:
  # Don't report issues in generated files.
  exclude-dirs:
    - internal/db/sqlc

