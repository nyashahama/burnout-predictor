version: "2"

sql:
  - engine: "postgresql"
    queries: "internal/db/queries/"
    schema: "internal/db/migrations/"
    gen:
      go:
        package: "db"
        out: "internal/db/sqlc/"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_exported_queries: false
        emit_result_struct_pointers: false
        overrides:
          # UUID columns → google/uuid
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          # DATE columns → pgtype.Date (preserves NULL)
          - db_type: "date"
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Date"
          # TIME columns → pgtype.Time
          - db_type: "time"
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Time"
          # JSONB columns → []byte (caller marshals/unmarshals)
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
